# 项目配置
project:
  name: "基于知识图谱的变速箱故障预测系统"
  data_path: "data/raw/XJTU_Gearbox"
  output_path: "results"

# Neo4j配置
neo4j:
  uri: "bolt://localhost:7687"
  username: "neo4j"
  password: "H13608700987rq"
  container_name: "neo4j"

# 数据预处理配置
preprocessing:
  window_size: 1024
  overlap: 512
  sampling_rate: 25600
  features:
    - time_domain: ["mean", "std", "rms", "max", "min", "peak", "kurtosis", "skewness"]
    - frequency_domain: ["spectral_centroid", "spectral_energy", "spectral_entropy"]

# 知识图谱配置
knowledge_graph:
  node_types:
    - Fault
    - Component
    - Signal
    - Feature
  edge_types:
    - CAUSED_BY
    - AFFECTS
    - HAS_FEATURE
    - LOCATED_AT
    - SIMILAR_TO

# 模型配置
models:
  gnn:
    hidden_dim: 128
    num_layers: 3
    dropout: 0.3
    learning_rate: 0.001
    epochs: 100

  rf:
    n_estimators: 200
    max_depth: 15
    min_samples_split: 5
    learning_rate: 0.001
    epochs: 100

  kg_enhanced_gnn:
    hidden_dim: 128
    num_layers: 3
    dropout: 0.3
    kg_embedding_dim: 64
    learning_rate: 0.001
    epochs: 100

  kg_enhanced_rf:
    n_estimators: 200
    max_depth: 15
    kg_embedding_dim: 64
    learning_rate: 0.001
    epochs: 100

  mlp:
    hidden_dim: 128
    dropout: 0.3
    learning_rate: 0.001
    epochs: 100

  kg_enhanced_mlp:
    hidden_dim: 128
    kg_embedding_dim: 64
    dropout: 0.3
    learning_rate: 0.001
    epochs: 100

  kg_enhanced_mlp_v2:
    hidden_dim: 128
    kg_embedding_dim: 33
    dropout: 0.3
    learning_rate: 0.001
    epochs: 100

# 训练配置
training:
  test_size: 0.2
  val_size: 0.1
  random_seed: 42
  early_stopping_patience: 15

# 可视化配置
visualization:
  figure_size: [12, 8]
  dpi: 300
  style: "darkgrid"
